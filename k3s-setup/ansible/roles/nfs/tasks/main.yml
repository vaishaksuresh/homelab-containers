---
- name: Check if NFS CSI driver is installed
  shell: kubectl get pods -n kube-system | grep csi-nfs
  register: nfs_csi_check
  ignore_errors: yes
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Install NFS CSI driver
  shell: |
    curl -skSL https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/deploy/install-driver.sh | bash -s master --
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: nfs_csi_check.rc != 0

- name: Wait for NFS CSI driver to be ready
  shell: kubectl wait pod --selector app=csi-nfs-controller -n kube-system --for condition=ready --timeout=60s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Create NFS StorageClass
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: nfs-client
      annotations:
        storageclass.kubernetes.io/is-default-class: "true"
    provisioner: nfs.csi.k8s.io
    parameters:
      server: {{ nfs_server }}
      share: {{ nfs_path }}
    mountOptions:
      - nfsvers=4.1
      - noatime
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Verify StorageClass created
  shell: kubectl get storageclass nfs-client
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
